{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agricultural Loan Credit Scorer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your Static CSS -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <!-- Header -->
            <div class="text-center mb-4">
                <h1 class="fw-bold text-success">🌾 Agricultural Loan Credit Scorer</h1>
                <p class="text-muted">AI-Based Loan Risk Assessment System</p>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">

                    <!-- FORM -->
                    <form id="loan-form" action="/prediction/" method="POST">
                        {% csrf_token %}

                        <div class="row g-3">

                            <div class="col-md-4">
                                <label class="form-label">Age</label>
                                <input type="number" name="age" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Land Area</label>
                                <input type="number" step="0.1" name="land_area" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Soil Type</label>
                                <select name="soil_type" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="Clay">Clay</option>
                                    <option value="Sandy">Sandy</option>
                                    <option value="Loamy">Loamy</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Sunlight Hours</label>
                                <input type="number" step="0.1" name="sunlight_hours" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Water Frequency</label>
                                <select name="water_freq" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="Daily">Daily</option>
                                    <option value="Weekly">Weekly</option>
                                    <option value="Bi-weekly">Bi-weekly</option>
                                    <option value="Monthly">Monthly</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Fertilizer Type</label>
                                <select name="fertilizer_type" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="Organic">Organic</option>
                                    <option value="Inorganic">Inorganic</option>
                                    <option value="Mixed">Mixed</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Temperature (°C)</label>
                                <input type="number" step="0.1" name="temperature" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Humidity (%)</label>
                                <input type="number" name="humidity" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Past Loan Status</label>
                                <select name="past_loan_status" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="Good">Good</option>
                                    <option value="Bad">Bad</option>
                                    <option value="None">None</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Annual Income</label>
                                <input type="number" name="income" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Loan Amount Requested</label>
                                <input type="number" name="loan_amount_requested" class="form-control" required>
                            </div>

                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-lg">
                                Predict Loan Approval
                            </button>
                        </div>

                    </form>
                </div>
            </div>

            <!-- RESULT SECTION (UNCHANGED IDs for JS compatibility) -->
            <div id="result-section" class="card shadow mt-4 hidden">
                <div class="card-body">
                    <h4 class="mb-3 text-center">Analysis Result</h4>

                    <div class="row text-center">
                        <div class="col-md-4">
                            <h6 class="text-muted">Loan Status</h6>
                            <p id="res-status" class="fw-bold fs-5">Pending</p>
                        </div>

                        <div class="col-md-4">
                            <h6 class="text-muted">Credit Score</h6>
                            <p id="res-score" class="fw-bold fs-5">0/100</p>
                        </div>

                        <div class="col-md-4">
                            <h6 class="text-muted">Risk Level</h6>
                            <p id="res-risk" class="fw-bold fs-5">Unknown</p>
                        </div>
                    </div>

                    <p id="error-message" class="text-danger text-center mt-3 hidden"></p>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="{% static 'script.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
