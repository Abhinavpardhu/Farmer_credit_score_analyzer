<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }
        .status {
            padding: 20px 40px;
            border-radius: 10px;
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin: 20px 0;
        }
        .approved {
            background-color: #4CAF50; /* Green */
        }
        .not-approved {
            background-color: #f44336; /* Red */
        }
        .error-box {
            background-color: #ff9800;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: inline-block;
            margin: 20px 0;
            max-width: 600px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #2196F3;
            color: white;
        }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Loan Status Checker</h1>

    {% if error %}
        <div class="error-box">
            <strong>Error:</strong><br>
            {{ error }}
        </div>
        <br>
        <button onclick="history.back()">Go Back</button>
    {% elif result %}
        <div id="loanStatus" class="status {% if result == 'Approved' %}approved{% else %}not-approved{% endif %}">
            {% if result == "Approved" %}
                ✓ Loan Approved
            {% else %}
                ✗ Loan Rejected
            {% endif %}
        </div>
        <p style="margin-top: 20px; font-size: 16px;">
            <strong>Prediction Score:</strong> {{ raw_prediction|floatformat:2 }}
        </p>
        <button onclick="location.href='/'">New Prediction</button>
    {% else %}
        <div class="error-box">
            No prediction data received. Please try again.
        </div>
        <br>
        <button onclick="history.back()">Go Back</button>
    {% endif %}

</body>
</html>
